services:
  db:
    image: postgres:16-alpine
    container_name: academic_db
    environment:
      POSTGRES_DB: academic_db
      POSTGRES_USER: academic_user
      POSTGRES_PASSWORD: academic_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U academic_user -d academic_db" ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: academic_api
    command: >
      sh -c "python -m app.database.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://academic_user:academic_password@db:5432/academic_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
